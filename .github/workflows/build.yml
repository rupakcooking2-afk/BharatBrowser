name: Build Bharat Browser

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Dependencies
        run: npm ci

      - name: Download Firefox Source
        run: npm run download

      - name: Verify engine repository
        run: |
          cd engine
          pwd
          git status
          git branch -a
          git rev-parse HEAD
          git log -1 --oneline

      - name: Import Bharat Changes
        run: npm run import

      - name: Bootstrap Build Environment
        run: |
          cd engine
          ./mach --no-interactive bootstrap --application-choice browser

      - name: Build Browser
        run: |
          cd engine
          ./mach build

      - name: Package Browser
        run: |
          cd engine
          ./mach package

      - name: Upload Browser Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bharat-browser-linux
          path: |
            obj-*/dist/**/*.tar.*
            obj-*/dist/**/*.zip
            obj-*/dist/**/*.deb